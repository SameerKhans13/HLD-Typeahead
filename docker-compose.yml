version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: typeahead-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: typeahead
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis-0:
    image: redis:7-alpine
    container_name: typeahead-redis-0
    ports:
      - "6379:6379"

  redis-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    ports:
      - "6380:6379"

  redis-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    ports:
      - "6381:6379"

  app-1:
    build: .
    container_name: typeahead-app-1
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/typeahead
      - REDIS_NODES=cache-node-0:redis-0:6379,cache-node-1:redis-1:6379,cache-node-2:redis-2:6379
    depends_on:
      - postgres
      - redis-0
      - redis-1
      - redis-2

  app-2:
    build: .
    container_name: typeahead-app-2
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/typeahead
      - REDIS_NODES=cache-node-0:redis-0:6379,cache-node-1:redis-1:6379,cache-node-2:redis-2:6379
    depends_on:
      - postgres
      - redis-0
      - redis-1
      - redis-2

  app-3:
    build: .
    container_name: typeahead-app-3
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/typeahead
      - REDIS_NODES=cache-node-0:redis-0:6379,cache-node-1:redis-1:6379,cache-node-2:redis-2:6379
    depends_on:
      - postgres
      - redis-0
      - redis-1
      - redis-2

  nginx:
    image: nginx:alpine
    container_name: typeahead-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3

volumes:
  postgres_data:
